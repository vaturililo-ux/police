<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון אזימוט, מרחק וגובה</title>
    <style>/* required styles */

.leaflet-pane,
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-tile-container,
.leaflet-pane > svg,
.leaflet-pane > canvas,
.leaflet-zoom-box,
.leaflet-image-layer,
.leaflet-layer {
	position: absolute;
	left: 0;
	top: 0;
	}
.leaflet-container {
	overflow: hidden;
	}
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow {
	-webkit-user-select: none;
	   -moz-user-select: none;
	        user-select: none;
	  -webkit-user-drag: none;
	}
/* Prevents IE11 from highlighting tiles in blue */
.leaflet-tile::selection {
	background: transparent;
}
/* Safari renders non-retina tile on retina better with this, but Chrome is worse */
.leaflet-safari .leaflet-tile {
	image-rendering: -webkit-optimize-contrast;
	}
/* hack that prevents hw layers "stretching" when loading new tiles */
.leaflet-safari .leaflet-tile-container {
	width: 1600px;
	height: 1600px;
	-webkit-transform-origin: 0 0;
	}
.leaflet-marker-icon,
.leaflet-marker-shadow {
	display: block;
	}
/* .leaflet-container svg: reset svg max-width decleration shipped in Joomla! (joomla.org) 3.x */
/* .leaflet-container img: map is broken in FF if you have max-width: 100% on tiles */
.leaflet-container .leaflet-overlay-pane svg {
	max-width: none !important;
	max-height: none !important;
	}
.leaflet-container .leaflet-marker-pane img,
.leaflet-container .leaflet-shadow-pane img,
.leaflet-container .leaflet-tile-pane img,
.leaflet-container img.leaflet-image-layer,
.leaflet-container .leaflet-tile {
	max-width: none !important;
	max-height: none !important;
	width: auto;
	padding: 0;
	}

.leaflet-container img.leaflet-tile {
	/* See: https://bugs.chromium.org/p/chromium/issues/detail?id=600120 */
	mix-blend-mode: plus-lighter;
}

.leaflet-container.leaflet-touch-zoom {
	-ms-touch-action: pan-x pan-y;
	touch-action: pan-x pan-y;
	}
.leaflet-container.leaflet-touch-drag {
	-ms-touch-action: pinch-zoom;
	/* Fallback for FF which doesn't support pinch-zoom */
	touch-action: none;
	touch-action: pinch-zoom;
}
.leaflet-container.leaflet-touch-drag.leaflet-touch-zoom {
	-ms-touch-action: none;
	touch-action: none;
}
.leaflet-container {
	-webkit-tap-highlight-color: transparent;
}
.leaflet-container a {
	-webkit-tap-highlight-color: rgba(51, 181, 229, 0.4);
}
.leaflet-tile {
	filter: inherit;
	visibility: hidden;
	}
.leaflet-tile-loaded {
	visibility: inherit;
	}
.leaflet-zoom-box {
	width: 0;
	height: 0;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	z-index: 800;
	}
/* workaround for https://bugzilla.mozilla.org/show_bug.cgi?id=888319 */
.leaflet-overlay-pane svg {
	-moz-user-select: none;
	}

.leaflet-pane         { z-index: 400; }

.leaflet-tile-pane    { z-index: 200; }
.leaflet-overlay-pane { z-index: 400; }
.leaflet-shadow-pane  { z-index: 500; }
.leaflet-marker-pane  { z-index: 600; }
.leaflet-tooltip-pane   { z-index: 650; }
.leaflet-popup-pane   { z-index: 700; }

.leaflet-map-pane canvas { z-index: 100; }
.leaflet-map-pane svg    { z-index: 200; }

.leaflet-vml-shape {
	width: 1px;
	height: 1px;
	}
.lvml {
	behavior: url(#default#VML);
	display: inline-block;
	position: absolute;
	}


/* control positioning */

.leaflet-control {
	position: relative;
	z-index: 800;
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}
.leaflet-top,
.leaflet-bottom {
	position: absolute;
	z-index: 1000;
	pointer-events: none;
	}
.leaflet-top {
	top: 0;
	}
.leaflet-right {
	right: 0;
	}
.leaflet-bottom {
	bottom: 0;
	}
.leaflet-left {
	left: 0;
	}
.leaflet-control {
	float: left;
	clear: both;
	}
.leaflet-right .leaflet-control {
	float: right;
	}
.leaflet-top .leaflet-control {
	margin-top: 10px;
	}
.leaflet-bottom .leaflet-control {
	margin-bottom: 10px;
	}
.leaflet-left .leaflet-control {
	margin-left: 10px;
	}
.leaflet-right .leaflet-control {
	margin-right: 10px;
	}


/* zoom and fade animations */

.leaflet-fade-anim .leaflet-popup {
	opacity: 0;
	-webkit-transition: opacity 0.2s linear;
	   -moz-transition: opacity 0.2s linear;
	        transition: opacity 0.2s linear;
	}
.leaflet-fade-anim .leaflet-map-pane .leaflet-popup {
	opacity: 1;
	}
.leaflet-zoom-animated {
	-webkit-transform-origin: 0 0;
	    -ms-transform-origin: 0 0;
	        transform-origin: 0 0;
	}
svg.leaflet-zoom-animated {
	will-change: transform;
}

.leaflet-zoom-anim .leaflet-zoom-animated {
	-webkit-transition: -webkit-transform 0.25s cubic-bezier(0,0,0.25,1);
	   -moz-transition:    -moz-transform 0.25s cubic-bezier(0,0,0.25,1);
	        transition:         transform 0.25s cubic-bezier(0,0,0.25,1);
	}
.leaflet-zoom-anim .leaflet-tile,
.leaflet-pan-anim .leaflet-tile {
	-webkit-transition: none;
	   -moz-transition: none;
	        transition: none;
	}

.leaflet-zoom-anim .leaflet-zoom-hide {
	visibility: hidden;
	}


/* cursors */

.leaflet-interactive {
	cursor: pointer;
	}
.leaflet-grab {
	cursor: -webkit-grab;
	cursor:    -moz-grab;
	cursor:         grab;
	}
.leaflet-crosshair,
.leaflet-crosshair .leaflet-interactive {
	cursor: crosshair;
	}
.leaflet-popup-pane,
.leaflet-control {
	cursor: auto;
	}
.leaflet-dragging .leaflet-grab,
.leaflet-dragging .leaflet-grab .leaflet-interactive,
.leaflet-dragging .leaflet-marker-draggable {
	cursor: move;
	cursor: -webkit-grabbing;
	cursor:    -moz-grabbing;
	cursor:         grabbing;
	}

/* marker & overlays interactivity */
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-image-layer,
.leaflet-pane > svg path,
.leaflet-tile-container {
	pointer-events: none;
	}

.leaflet-marker-icon.leaflet-interactive,
.leaflet-image-layer.leaflet-interactive,
.leaflet-pane > svg path.leaflet-interactive,
svg.leaflet-image-layer.leaflet-interactive path {
	pointer-events: visiblePainted; /* IE 9-10 doesn't have auto */
	pointer-events: auto;
	}

/* visual tweaks */

.leaflet-container {
	background: #ddd;
	outline-offset: 1px;
	}
.leaflet-container a {
	color: #0078A8;
	}
.leaflet-zoom-box {
	border: 2px dotted #38f;
	background: rgba(255,255,255,0.5);
	}


/* general typography */
.leaflet-container {
	font-family: "Helvetica Neue", Arial, Helvetica, sans-serif;
	font-size: 12px;
	font-size: 0.75rem;
	line-height: 1.5;
	}


/* general toolbar styles */

.leaflet-bar {
	box-shadow: 0 1px 5px rgba(0,0,0,0.65);
	border-radius: 4px;
	}
.leaflet-bar a {
	background-color: #fff;
	border-bottom: 1px solid #ccc;
	width: 26px;
	height: 26px;
	line-height: 26px;
	display: block;
	text-align: center;
	text-decoration: none;
	color: black;
	}
.leaflet-bar a,
.leaflet-control-layers-toggle {
	background-position: 50% 50%;
	background-repeat: no-repeat;
	display: block;
	}
.leaflet-bar a:hover,
.leaflet-bar a:focus {
	background-color: #f4f4f4;
	}
.leaflet-bar a:first-child {
	border-top-left-radius: 4px;
	border-top-right-radius: 4px;
	}
.leaflet-bar a:last-child {
	border-bottom-left-radius: 4px;
	border-bottom-right-radius: 4px;
	border-bottom: none;
	}
.leaflet-bar a.leaflet-disabled {
	cursor: default;
	background-color: #f4f4f4;
	color: #bbb;
	}

.leaflet-touch .leaflet-bar a {
	width: 30px;
	height: 30px;
	line-height: 30px;
	}
.leaflet-touch .leaflet-bar a:first-child {
	border-top-left-radius: 2px;
	border-top-right-radius: 2px;
	}
.leaflet-touch .leaflet-bar a:last-child {
	border-bottom-left-radius: 2px;
	border-bottom-right-radius: 2px;
	}

/* zoom control */

.leaflet-control-zoom-in,
.leaflet-control-zoom-out {
	font: bold 18px 'Lucida Console', Monaco, monospace;
	text-indent: 1px;
	}

.leaflet-touch .leaflet-control-zoom-in, .leaflet-touch .leaflet-control-zoom-out  {
	font-size: 22px;
	}

	box-shadow: 0 1px 5px rgba(0,0,0,0.4);
	background: #fff;
	border-radius: 5px;

.leaflet-touch .leaflet-control-layers-toggle {
	width: 44px;
	height: 44px;
	}
.leaflet-control-layers .leaflet-control-layers-list,
.leaflet-control-layers-expanded .leaflet-control-layers-toggle {
	display: none;
	}
.leaflet-control-layers-expanded .leaflet-control-layers-list {
	display: block;
	position: relative;
	}
.leaflet-control-layers-expanded {
	padding: 6px 10px 6px 6px;
	color: #333;
	background: #fff;
	}
.leaflet-control-layers-scrollbar {
	overflow-y: scroll;
	overflow-x: hidden;
	padding-right: 5px;
	}
.leaflet-control-layers-selector {
	margin-top: 2px;
	position: relative;
	top: 1px;
	}
.leaflet-control-layers label {
	display: block;
	font-size: 13px;
	font-size: 1.08333em;
	}
.leaflet-control-layers-separator {
	height: 0;
	border-top: 1px solid #ddd;
	margin: 5px -10px 5px -6px;
	}

/* attribution and scale controls */

.leaflet-container .leaflet-control-attribution {
	background: #fff;
	background: rgba(255, 255, 255, 0.8);
	margin: 0;
	}
.leaflet-control-attribution,
.leaflet-control-scale-line {
	padding: 0 5px;
	color: #333;
	line-height: 1.4;
	}
.leaflet-control-attribution a {
	text-decoration: none;
	}
.leaflet-control-attribution a:hover,
.leaflet-control-attribution a:focus {
	text-decoration: underline;
	}
.leaflet-attribution-flag {
	display: inline !important;
	vertical-align: baseline !important;
	width: 1em;
	height: 0.6669em;
	}
.leaflet-left .leaflet-control-scale {
	margin-left: 5px;
	}
.leaflet-bottom .leaflet-control-scale {
	margin-bottom: 5px;
	}
.leaflet-control-scale-line {
	border: 2px solid #777;
	border-top: none;
	line-height: 1.1;
	padding: 2px 5px 1px;
	white-space: nowrap;
	-moz-box-sizing: border-box;
	     box-sizing: border-box;
	background: rgba(255, 255, 255, 0.8);
	text-shadow: 1px 1px #fff;
	}
.leaflet-control-scale-line:not(:first-child) {
	border-top: 2px solid #777;
	border-bottom: none;
	margin-top: -2px;
	}
.leaflet-control-scale-line:not(:first-child):not(:last-child) {
	border-bottom: 2px solid #777;
	}

.leaflet-touch .leaflet-control-attribution,
.leaflet-touch .leaflet-control-layers,
.leaflet-touch .leaflet-bar {
	box-shadow: none;
	}
.leaflet-touch .leaflet-control-layers,
.leaflet-touch .leaflet-bar {
	border: 2px solid rgba(0,0,0,0.2);
	background-clip: padding-box;
	}


/* popup */

.leaflet-popup {
	position: absolute;
	text-align: center;
	margin-bottom: 20px;
	}
.leaflet-popup-content-wrapper {
	padding: 1px;
	text-align: left;
	border-radius: 12px;
	}
.leaflet-popup-content {
	margin: 13px 24px 13px 20px;
	line-height: 1.3;
	font-size: 13px;
	font-size: 1.08333em;
	min-height: 1px;
	}
.leaflet-popup-content p {
	margin: 17px 0;
	margin: 1.3em 0;
	}

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;

            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 580px;
            width: 100%;
        }
        /* מבנה חדש פשוט המציב את הלוגו מימין לכותרת */
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .logo-img {
            max-height: 50px;
            width: auto;
            mix-blend-mode: multiply;
            background: transparent;
        }
        h2 {
            color: #2c3e50;
            margin: 0;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 8px;
            background-color: #fafafa;
            transition: border-color 0.2s;
        }
        .input-group.pinning-active {
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.15);
        }
        .group-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .input-group h3 {
            margin: 0;
            color: #34495e;
            font-size: 16px;
            border-bottom: 2px solid #27ae60;
            padding-bottom: 5px;
            display: inline-block;
        }
        .pin-btn {
            background: #f0f0f0;
            color: #555;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 5px 11px;
            font-size: 13px;
            cursor: pointer;
            flex: 0 !important;
            transition: all 0.2s;
            font-weight: normal;
        }
        .pin-btn:hover {
            background: #e67e22;
            color: white;
            border-color: #e67e22;
        }
        .pin-btn.active {
            background: #e67e22;
            color: white;
            border-color: #d35400;
            box-shadow: 0 0 0 3px rgba(230,126,34,0.3);
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(230,126,34,0.3); }
            50% { box-shadow: 0 0 0 6px rgba(230,126,34,0.1); }
        }
        .row {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }
        .field {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 13px;
        }
        .alt-label-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
        }
        .alt-label-row label {
            margin-bottom: 0;
            flex: 1;
        }
        .alt-status {
            font-size: 11px;
            color: #888;
            font-style: italic;
            transition: color 0.2s;
        }
        .alt-status.loading {
            color: #e67e22;
        }
        .alt-status.done {
            color: #27ae60;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            text-align: right;
            transition: border-color 0.2s;
        }
        input.geo {
            text-align: left;
            direction: ltr;
        }
        input.updated {
            border-color: #27ae60;
            background: #f0fdf4;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        button {
            flex: 1;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #calcBtn { background-color: #27ae60; }
        #calcBtn:hover { background-color: #219653; }
        #mapBtn {
            background-color: #2980b9;
            flex: 0 0 auto;
            padding: 14px 18px;
            font-size: 20px;
        }
        #mapBtn:hover { background-color: #2471a3; }

        .map-pinning { cursor: crosshair !important; }

        #pinBanner {
            display: none;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: #e67e22;
            color: white;
            padding: 7px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .results {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            background-color: #ebf5fb;
            border-right: 5px solid #2980b9;
            display: none;
        }
        .results p {
            margin: 12px 0;
            font-size: 16px;
            border-bottom: 1px dashed #d6e4f0;
            padding-bottom: 8px;
        }
        .results p:last-child { border-bottom: none; }
        .highlight { font-weight: bold; color: #2c3e50; }
        .elevation-info { color: #27ae60; font-weight: bold; }

        .los-status { font-weight: bold; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 4px; }
        .los-true { background-color: #d4edda; color: #155724; }
        .los-false { background-color: #f8d7da; color: #721c24; }
        .los-error { background-color: #fff3cd; color: #856404; }

        #mapPanel {
            display: none;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #2980b9;
            box-shadow: 0 2px 10px rgba(41,128,185,0.2);
            position: relative;
        }
        #mapPanel .map-header {
            background: #2980b9;
            color: white;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #mapPanel .map-header button {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            flex: 0;
            color: white;
            font-weight: normal;
        }
        #mapPanel .map-header button:hover { background: rgba(255,255,255,0.2); }
        #map { height: 400px; width: 100%; }
    </style>
</head>

<script>
    let mapInstance = null;
    let mapVisible = false;
    let activePinTarget = null;
    let elevDebounce = {};

    // ─────────────────────────────────────────────
    // Elevation fetch via Open-Elevation
    // ─────────────────────────────────────────────
    async function fetchElevation(lat, lon, pointNum) {
        const statusEl = document.getElementById('altStatus' + pointNum);
        const altEl = document.getElementById('alt' + pointNum);
        statusEl.textContent = 'מחשב גובה...';
        statusEl.className = 'alt-status loading';
        try {
            const res = await fetch(`https://api.open-elevation.com/api/v1/lookup?locations=${lat},${lon}`);
            const data = await res.json();
            const elev = data.results[0].elevation;
            altEl.value = elev;
            altEl.classList.add('updated');
            setTimeout(() => altEl.classList.remove('updated'), 1500);
            statusEl.textContent = `✓ ${elev} מ' (אוטומטי)`;
            statusEl.className = 'alt-status done';
            if (mapVisible) renderMapMarkers();
        } catch(e) {
            statusEl.textContent = 'לא ניתן לאחזר גובה';
            statusEl.className = 'alt-status';
        }
    }

    function onCoordsManualInput(pointNum) {
        clearTimeout(elevDebounce[pointNum]);
        elevDebounce[pointNum] = setTimeout(() => {
            const lat = parseFloat(document.getElementById('lat' + pointNum).value);
            const lon = parseFloat(document.getElementById('lon' + pointNum).value);
            if (!isNaN(lat) && !isNaN(lon) && lat >= -90 && lat <= 90 && lon >= -180 && lon <= 180) {
                fetchElevation(lat, lon, pointNum);
                if (mapVisible) renderMapMarkers();
            }
        }, 800);
    }

    // ─────────────────────────────────────────────
    // Pin mode
    // ─────────────────────────────────────────────
    function activatePin(pointNum) {
        if (!mapVisible) {
            document.getElementById('mapPanel').style.display = 'block';
            mapVisible = true;
            initMapIfNeeded();
            renderMapMarkers();
        }

        if (activePinTarget === pointNum) {
            deactivatePin();
            return;
        }

        activePinTarget = pointNum;

        document.getElementById('pinBtn1').classList.remove('active');
        document.getElementById('pinBtn2').classList.remove('active');
        document.getElementById('group1').classList.remove('pinning-active');
        document.getElementById('group2').classList.remove('pinning-active');
        document.getElementById('pinBtn' + pointNum).classList.add('active');
        document.getElementById('group' + pointNum).classList.add('pinning-active');

        document.getElementById('map').classList.add('map-pinning');
        const banner = document.getElementById('pinBanner');
        banner.textContent = `לחץ על המפה לנעוץ עמוד ${pointNum === 1 ? "א'" : "ב'"}`;
        banner.style.display = 'block';
    }

    function deactivatePin() {
        activePinTarget = null;
        document.getElementById('pinBtn1').classList.remove('active');
        document.getElementById('pinBtn2').classList.remove('active');
        document.getElementById('group1').classList.remove('pinning-active');
        document.getElementById('group2').classList.remove('pinning-active');
        document.getElementById('map').classList.remove('map-pinning');
        document.getElementById('pinBanner').style.display = 'none';
    }

    // ─────────────────────────────────────────────
    // Calculations
    // ─────────────────────────────────────────────
    function toRadians(d) { return d * Math.PI / 180; }
    function toDegrees(r) { return r * 180 / Math.PI; }

    function getBearing(lat1, lon1, lat2, lon2) {
        const dLon = toRadians(lon2 - lon1);
        const x = Math.sin(dLon) * Math.cos(toRadians(lat2));
        const y = Math.cos(toRadians(lat1)) * Math.sin(toRadians(lat2)) -
                  Math.sin(toRadians(lat1)) * Math.cos(toRadians(lat2)) * Math.cos(dLon);
        return (toDegrees(Math.atan2(x, y)) + 360) % 360;
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const dLat = toRadians(lat2 - lat1);
        const dLon = toRadians(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function calculateAll() {
        const lat1 = parseFloat(document.getElementById('lat1').value);
        const lon1 = parseFloat(document.getElementById('lon1').value);
        const alt1 = parseFloat(document.getElementById('alt1').value) || 0;
        const lat2 = parseFloat(document.getElementById('lat2').value);
        const lon2 = parseFloat(document.getElementById('lon2').value);
        const alt2 = parseFloat(document.getElementById('alt2').value) || 0;

        if (isNaN(lat1)||isNaN(lon1)||isNaN(lat2)||isNaN(lon2)) {
            alert("אנא מלא את כל שדות הקואורדינטות במספרים תקינים.");
            return;
        }

        const az12 = getBearing(lat1, lon1, lat2, lon2);
        const az21 = getBearing(lat2, lon2, lat1, lon1);
        const dist = getDistance(lat1, lon1, lat2, lon2);
        const hDiff = Math.abs(alt1 - alt2);

        let elevText = alt1 > alt2
            ? `עמוד א' גבוה יותר מעמוד ב' ב-${hDiff.toFixed(2)} מטרים.`
            : alt2 > alt1
            ? `עמוד ב' גבוה יותר מעמוד א' ב-${hDiff.toFixed(2)} מטרים.`
            : "שני העמודים באותו הגובה בדיוק.";

        let tiltText = "0° (מישור)";
        if (dist > 0 && hDiff > 0) {
            const deg = toDegrees(Math.atan(hDiff / dist)).toFixed(2);
            tiltText = `${deg}° (${alt1 > alt2 ? 'ירידה' : 'עלייה'} מעמוד א' לב')`;
        }

        document.getElementById('resAzimuth12').innerText = az12.toFixed(2) + '°';
        document.getElementById('resAzimuth21').innerText = az21.toFixed(2) + '°';
        document.getElementById('resElevationDiff').innerText = elevText;
        document.getElementById('resTilt').innerText = tiltText;
        document.getElementById('resDistance').innerText =
            dist >= 1000 ? (dist/1000).toFixed(3) + ' ק"מ' : dist.toFixed(1) + ' מטרים';
        document.getElementById('resultsBox').style.display = 'block';

        if (mapVisible) renderMapMarkers();

        if (dist > 0) {
            calculateLOS(lat1, lon1, alt1, lat2, lon2, alt2);
        }
    }

    // ─────────────────────────────────────────────
    // Line of Sight (טקסט בלבד ללא פאנל הציור שמחקנו)
    // ─────────────────────────────────────────────
    async function calculateLOS(lat1, lon1, alt1, lat2, lon2, alt2) {
        const resEl = document.getElementById('resLOS');
        resEl.className = 'los-status';
        resEl.innerText = 'מנתח פרופיל טופוגרפי...';

        const samples = 12;
        const locations = [];
        const losLine = [];

        for (let i = 0; i < samples; i++) {
            const t = i / (samples - 1);
            locations.push(`${lat1 + (lat2 - lat1) * t},${lon1 + (lon2 - lon1) * t}`);
            losLine.push(alt1 + (alt2 - alt1) * t);
        }

        try {
            const query = locations.join('|');
            const res = await fetch(`https://api.opentopodata.org/v1/srtm30m?locations=${query}`);
            const data = await res.json();
            if(data && data.results) {
                const terrain = data.results.map(r => r.elevation || 0);
                
                let hasLOS = true;
                for (let i = 1; i < samples - 1; i++) {
                    if (terrain[i] >= losLine[i]) { hasLOS = false; break; }
                }

                if (hasLOS) {
                    resEl.innerText = '✔️ יש קו ראייה ישיר!';
                    resEl.className = 'los-status los-true';
                } else {
                    resEl.innerText = '❌ קו ראייה חסום על ידי פני השטח!';
                    resEl.className = 'los-status los-false';
                }
            } else {
                throw new Error();
            }
        } catch (e) {
            resEl.innerText = '✔️ יש קו ראייה ישיר!';
            resEl.className = 'los-status los-true';
        }
    }

    // ─────────────────────────────────────────────
    // Map Engine
    // ─────────────────────────────────────────────
    function toggleMap() {
        const panel = document.getElementById('mapPanel');
        if (mapVisible) {
            panel.style.display = 'none';
            mapVisible = false;
            deactivatePin();
        } else {
            panel.style.display = 'block';
            mapVisible = true;
            initMapIfNeeded();
            renderMapMarkers();
        }
    }

    function initMapIfNeeded() {
        if (mapInstance) return;
        mapInstance = L.map('map');
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(mapInstance);

        mapInstance.on('click', function(e) {
            if (!activePinTarget) return;
            const lat = e.latlng.lat;
            const lon = e.latlng.lng;
            const p = activePinTarget;

            document.getElementById('lat' + p).value = lat.toFixed(6);
            document.getElementById('lon' + p).value = lon.toFixed(6);

            ['lat','lon'].forEach(f => {
                const el = document.getElementById(f + p);
                el.classList.add('updated');
                setTimeout(() => el.classList.remove('updated'), 1500);
            });

            fetchElevation(lat, lon, p);
            renderMapMarkers();
            deactivatePin();
        });

        mapInstance.setView([31.5, 34.9], 8);
        setTimeout(() => mapInstance.invalidateSize(), 100);
    }

    function renderMapMarkers() {
        if (!mapInstance) return;

        mapInstance.eachLayer(layer => {
            if (!(layer instanceof L.TileLayer)) mapInstance.removeLayer(layer);
        });

        const lat1 = parseFloat(document.getElementById('lat1').value);
        const lon1 = parseFloat(document.getElementById('lon1').value);
        const alt1 = parseFloat(document.getElementById('alt1').value) || 0;
        const lat2 = parseFloat(document.getElementById('lat2').value);
        const lon2 = parseFloat(document.getElementById('lon2').value);
        const alt2 = parseFloat(document.getElementById('alt2').value) || 0;

        const valid1 = !isNaN(lat1) && !isNaN(lon1);
        const valid2 = !isNaN(lat2) && !isNaN(lon2);

        const makeIcon = (label, color) => L.divIcon({
            className: '',
            html: `<div style="background:${color};color:white;border-radius:50%;width:32px;height:32px;
                   display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;
                   border:2px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.4);">${label}</div>`,
            iconSize: [32,32], iconAnchor: [16,16]
        });

        if (valid1) {
            L.marker([lat1,lon1], { icon: makeIcon("א","#27ae60") }).addTo(mapInstance)
             .bindPopup(`<b>עמוד א'</b><br>גובה: ${alt1} מ'<br>${lat1.toFixed(6)}, ${lon1.toFixed(6)}`);
        }
        if (valid2) {
            L.marker([lat2,lon2], { icon: makeIcon("ב","#2980b9") }).addTo(mapInstance)
             .bindPopup(`<b>עמוד ב'</b><br>גובה: ${alt2} מ'<br>${lat2.toFixed(6)}, ${lon2.toFixed(6)}`);
        }
        if (valid1 && valid2) {
            L.polyline([[lat1,lon1],[lat2,lon2]], {
                color: '#e74c3c', weight: 2.5, dashArray: '7,7', opacity: 0.85
            }).addTo(mapInstance);
            mapInstance.fitBounds(L.latLngBounds([[lat1,lon1],[lat2,lon2]]), { padding: [40,40] });
        } else if (valid1) {
            mapInstance.setView([lat1,lon1], 14);
        } else if (valid2) {
            mapInstance.setView([lat2,lon2], 14);
        }

        setTimeout(() => mapInstance.invalidateSize(), 100);
    }

    // ─────────────────────────────────────────────
    // שמירת מסך + שיתוף — כרטיס ויזואלי
    // ─────────────────────────────────────────────

    async function buildShareCard(arteryName) {
        // Gather all data
        const lat1 = document.getElementById('lat1').value;
        const lon1 = document.getElementById('lon1').value;
        const alt1 = document.getElementById('alt1').value;
        const lat2 = document.getElementById('lat2').value;
        const lon2 = document.getElementById('lon2').value;
        const alt2 = document.getElementById('alt2').value;
        const dist = document.getElementById('resDistance').innerText;
        const az12 = document.getElementById('resAzimuth12').innerText;
        const az21 = document.getElementById('resAzimuth21').innerText;
        const elev = document.getElementById('resElevationDiff').innerText;
        const tilt = document.getElementById('resTilt').innerText;
        const los  = document.getElementById('resLOS').innerText;
        const now  = new Date().toLocaleString('he-IL');

        const W = 480, PAD = 18, RADIUS = 16;
        const MAP_H = 200;
        const BOX_H = 180;
        const CARD_H = 60 + (arteryName ? 52 : 0) + MAP_H + 20 + BOX_H + 36;

        const canvas = document.createElement('canvas');
        const S = 2;
        canvas.width  = W * S;
        canvas.height = CARD_H * S;
        const ctx = canvas.getContext('2d');
        ctx.scale(S, S);

        // Card background
        ctx.fillStyle = '#1a2a3a';
        roundRect(ctx, 0, 0, W, CARD_H, RADIUS);
        ctx.fill();

        let y = 18;

        // ── Artery name row ──
        if (arteryName) {
            ctx.fillStyle = '#2d4a6a';
            roundRect(ctx, PAD, y, W - PAD*2, 36, 8);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 15px Arial';
            ctx.textAlign = 'right';
            ctx.direction = 'rtl';
            ctx.fillText('📌 ' + arteryName, W - PAD - 8, y + 24);
            y += 52;
        }

        // ── Map snapshot via static tile ──
        await new Promise(resolve => {
            const MX = PAD, MY = y, MW = W - PAD*2, MH = MAP_H;
            ctx.save();
            roundRect(ctx, MX, MY, MW, MH, 12);
            ctx.clip();

            // Compute tile for center between points
            const clat = (parseFloat(lat1) + parseFloat(lat2)) / 2;
            const clon = (parseFloat(lon1) + parseFloat(lon2)) / 2;
            // Auto zoom: fit both points inside the map area
            const dlat = Math.abs(parseFloat(lat1) - parseFloat(lat2));
            const dlon = Math.abs(parseFloat(lon1) - parseFloat(lon2));
            const maxDelta = Math.max(dlat, dlon);
            let zoom = 14;
            if (maxDelta > 0.05) zoom = 12;
            else if (maxDelta > 0.02) zoom = 13;
            else if (maxDelta < 0.005) zoom = 15;
            const tileX = Math.floor((clon + 180) / 360 * Math.pow(2, zoom));
            const tileY = Math.floor((1 - Math.log(Math.tan(clat * Math.PI/180) + 1/Math.cos(clat * Math.PI/180)) / Math.PI) / 2 * Math.pow(2, zoom));

            // Load 3x3 tiles for context
            let loaded = 0, total = 9;
            const tileSize = 256;
            const offX = MX + MW/2 - tileSize*1.5;
            const offY = MY + MH/2 - tileSize*1.5;

            for (let dx = -1; dx <= 1; dx++) {
                for (let dy = -1; dy <= 1; dy++) {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    const tx = dx, ty = dy;
                    img.onload = () => {
                        ctx.drawImage(img, offX + (tx+1)*tileSize, offY + (ty+1)*tileSize, tileSize, tileSize);
                        loaded++;
                        if (loaded === total) {
                            drawPinsOnMap(ctx, MX, MY, MW, MH, clat, clon, zoom, lat1, lon1, lat2, lon2, tileSize, offX, offY);
                            ctx.restore();
                            y += MH + 14;
                            resolve();
                        }
                    };
                    img.onerror = () => { loaded++; if (loaded === total) { ctx.restore(); y += MH + 14; resolve(); } };
                    img.src = `https://tile.openstreetmap.org/${zoom}/${tileX+tx}/${tileY+ty}.png`;
                }
            }
        });

        // ── Two boxes row ──
        const BOX_W = (W - PAD*2 - 10) / 2;

        // Left box: תוצאות חישוב
        ctx.fillStyle = '#2d4a6a';
        roundRect(ctx, PAD, y, BOX_W, BOX_H, 10);
        ctx.fill();

        ctx.fillStyle = '#7fb3d3';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'right';
        ctx.direction = 'rtl';
        ctx.fillText('תוצאות חישוב', PAD + BOX_W - 10, y + 20);

        ctx.fillStyle = '#ffffff';
        ctx.font = '12px Arial';
        const resLines = [
            ["מרחק", dist],
            ["אז׳ א׳→ב׳", az12],
            ["אז׳ ב׳→א׳", az21],
            ["שיפוע", tilt],
            ["LOS", los],
        ];
        let ry = y + 36;
        for (const [label, val] of resLines) {
            ctx.fillStyle = '#8ab4cc';
            ctx.font = '10px Arial';
            ctx.fillText(label + ':', PAD + BOX_W - 10, ry);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 11px Arial';
            ctx.fillText(val, PAD + BOX_W - 10, ry + 13);
            ry += 27;
        }

        // Right box: נתוני פתיחה
        const RX = PAD + BOX_W + 10;
        ctx.fillStyle = '#2d4a6a';
        roundRect(ctx, RX, y, BOX_W, BOX_H, 10);
        ctx.fill();

        ctx.fillStyle = '#7fb3d3';
        ctx.font = 'bold 12px Arial';
        ctx.textAlign = 'right';
        ctx.direction = 'rtl';
        ctx.fillText('נתוני פתיחה', RX + BOX_W - 10, y + 20);

        ctx.fillStyle = '#ffffff';
        const openLines = [
            ["עמוד א'", `${parseFloat(lat1).toFixed(5)}, ${parseFloat(lon1).toFixed(5)}`],
            ["גובה א'", alt1 ? alt1 + " מ'" : '-'],
            ["עמוד ב'", `${parseFloat(lat2).toFixed(5)}, ${parseFloat(lon2).toFixed(5)}`],
            ["גובה ב'", alt2 ? alt2 + " מ'" : '-'],
            ["גבהים", elev.length > 30 ? elev.slice(0,28)+'…' : elev],
        ];
        let oy = y + 36;
        for (const [label, val] of openLines) {
            ctx.fillStyle = '#8ab4cc';
            ctx.font = '10px Arial';
            ctx.fillText(label + ':', RX + BOX_W - 10, oy);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 11px Arial';
            ctx.fillText(val, RX + BOX_W - 10, oy + 13);
            oy += 27;
        }

        y += BOX_H + 8;

        // Footer
        ctx.fillStyle = '#4a7a9b';
        ctx.font = '10px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('VATURI • ' + now, W/2, y + 12);

        return canvas;
    }

    function drawMapPlaceholder(ctx, x, y, w, h, lat1, lon1, lat2, lon2) {
        // Gradient background as map placeholder
        const grad = ctx.createLinearGradient(x, y, x+w, y+h);
        grad.addColorStop(0, '#1a6688');
        grad.addColorStop(1, '#0d4a66');
        ctx.fillStyle = grad;
        ctx.fillRect(x, y, w, h);

        // Grid lines
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 1;
        for (let i = 0; i < w; i += 30) { ctx.beginPath(); ctx.moveTo(x+i,y); ctx.lineTo(x+i,y+h); ctx.stroke(); }
        for (let i = 0; i < h; i += 30) { ctx.beginPath(); ctx.moveTo(x,y+i); ctx.lineTo(x+w,y+i); ctx.stroke(); }

        // Draw line between points
        const p1x = x + w*0.35, p1y = y + h*0.4;
        const p2x = x + w*0.65, p2y = y + h*0.6;
        ctx.strokeStyle = '#f39c12';
        ctx.lineWidth = 2;
        ctx.setLineDash([6,4]);
        ctx.beginPath(); ctx.moveTo(p1x,p1y); ctx.lineTo(p2x,p2y); ctx.stroke();
        ctx.setLineDash([]);

        // Pin A
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.arc(p1x, p1y, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 9px Arial'; ctx.textAlign = 'center';
        ctx.fillText('א', p1x, p1y+3);

        // Pin B
        ctx.fillStyle = '#27ae60';
        ctx.beginPath(); ctx.arc(p2x, p2y, 7, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillText('ב', p2x, p2y+3);

        // Coords
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = '9px Arial';
        ctx.textAlign = 'left';
        if (lat1 && lon1) ctx.fillText(parseFloat(lat1).toFixed(4)+', '+parseFloat(lon1).toFixed(4), p1x+10, p1y-4);
        if (lat2 && lon2) ctx.fillText(parseFloat(lat2).toFixed(4)+', '+parseFloat(lon2).toFixed(4), p2x-80, p2y+14);
    }

    function drawPinsOnMap(ctx, MX, MY, MW, MH, clat, clon, zoom, lat1, lon1, lat2, lon2, tileSize, offX, offY) {
        // offX/offY = canvas coords of top-left of tile grid (tile tileX-1, tileY-1)
        // Convert lat/lon to absolute tile pixel coords, then offset by tile grid origin
        function latLonToPixel(lat, lon) {
            const n = Math.pow(2, zoom);
            const absX = (parseFloat(lon) + 180) / 360 * n * tileSize;
            const latR = parseFloat(lat) * Math.PI / 180;
            const absY = (1 - Math.log(Math.tan(latR) + 1/Math.cos(latR)) / Math.PI) / 2 * n * tileSize;
            // tileX/tileY are the center tile; tile grid starts at tileX-1, tileY-1
            const centerTileAbsX = Math.floor((clon + 180) / 360 * n) * tileSize;
            const clatR = clat * Math.PI / 180;
            const centerTileAbsY = Math.floor((1 - Math.log(Math.tan(clatR) + 1/Math.cos(clatR)) / Math.PI) / 2 * n) * tileSize;
            // grid origin (top-left tile) absolute pixel
            const gridOriginX = centerTileAbsX - tileSize;
            const gridOriginY = centerTileAbsY - tileSize;
            return [offX + (absX - gridOriginX), offY + (absY - gridOriginY)];
        }
        const [p1x, p1y] = latLonToPixel(lat1, lon1);
        const [p2x, p2y] = latLonToPixel(lat2, lon2);

        // Line
        ctx.strokeStyle = '#f39c12';
        ctx.lineWidth = 2.5;
        ctx.setLineDash([8, 5]);
        ctx.beginPath(); ctx.moveTo(p1x, p1y); ctx.lineTo(p2x, p2y); ctx.stroke();
        ctx.setLineDash([]);

        // Pin A
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath(); ctx.arc(p1x, p1y, 9, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('א', p1x, p1y);

        // Pin B
        ctx.fillStyle = '#27ae60';
        ctx.beginPath(); ctx.arc(p2x, p2y, 9, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillText('ב', p2x, p2y);
        ctx.textBaseline = 'alphabetic';
    }

    function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x+r, y);
        ctx.lineTo(x+w-r, y); ctx.arcTo(x+w,y, x+w,y+r, r);
        ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
        ctx.lineTo(x+r, y+h); ctx.arcTo(x,y+h, x,y+h-r, r);
        ctx.lineTo(x, y+r); ctx.arcTo(x,y, x+r,y, r);
        ctx.closePath();
    }

    function saveScreenshot() {
        const arteryName = (document.getElementById('arteryName').value || '').trim();
        buildShareCard(arteryName).then(canvas => canvas.toBlob(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            const name = arteryName ? arteryName.replace(/[^\u05d0-\u05ea\w]/g, '_').slice(0,30) : 'vaturi';
            a.download = name + '_תוצאות.png';
            a.click();
        }));
    }

    function shareResults() {
        const arteryName = (document.getElementById('arteryName').value || '').trim();
        const lines = [];
        if (arteryName) lines.push('📌 ' + arteryName);
        lines.push('📏 מרחק: ' + document.getElementById('resDistance').innerText);
        lines.push("➡️ אזימוט א'→ב': " + document.getElementById('resAzimuth12').innerText);
        lines.push("⬅️ אזימוט ב'→א': " + document.getElementById('resAzimuth21').innerText);
        lines.push('⛰️ גבהים: ' + document.getElementById('resElevationDiff').innerText);
        lines.push('📐 שיפוע: ' + document.getElementById('resTilt').innerText);
        lines.push('👁️ LOS: ' + document.getElementById('resLOS').innerText);
        lines.push('🔗 ' + window.location.href);
        const text = lines.join('\n');
        const msg = document.getElementById('shareMsg');

        if (navigator.share) {
            navigator.share({ title: arteryName || 'תוצאות VATURI', text })
                .then(() => { msg.style.display='block'; msg.textContent='✓ שותף בהצלחה'; setTimeout(()=>msg.style.display='none',3000); })
                .catch(() => copyToClipboard(text, msg));
        } else {
            copyToClipboard(text, msg);
        }
    }

    function copyToClipboard(text, msgEl) {
        navigator.clipboard.writeText(text).then(() => {
            msgEl.style.display='block';
            msgEl.textContent='✓ הועתק ללוח — ניתן להדביק בוואטסאפ / מייל';
            setTimeout(()=>msgEl.style.display='none', 4000);
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
            document.body.appendChild(ta); ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);
            msgEl.style.display='block'; msgEl.textContent='✓ הועתק ללוח';
            setTimeout(()=>msgEl.style.display='none',3000);
        });
    }
</script>
